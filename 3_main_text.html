<!DOCTYPE html
    PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <meta content="zh-tw" http-equiv="Content-Language" />
    <meta content="text/html; charset=utf-8" http-equiv="Content-Type" />
    <title>Main text</title>

    <meta charset="UTF-8">
    <title>固定圖片位置的表格</title>
    <style>
        table {
            width: 80%;
            border-collapse: collapse;
            /* 去掉雙邊框的空隙 */
            margin: 20px auto;
        }

        th,
        td {
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
            /* 文字或圖片置中 */
            vertical-align: middle;
            /* 垂直置中 */
            width: 150px;
            /* 固定欄寬 */
            height: 150px;
            /* 固定欄高 */
            overflow: hidden;
            /* 防止圖片超出 */
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* 確保圖片比例不變 */
        }
    </style>


</head>

<body>

    <p>Main text</p>
    <p>a. 文字 + 圖片 + 對外連結 + 對內連結</p>
    <p>文字</p>
    <img src="public_html/IMG/icon.png" style="width: 10%;"><br>
    <a href="https://www.youtube.com/@qbol_channel" target="_blank" rel="noopener noreferrer">對外連結</a><br>
    <a href="index.html" target="_blank" rel="noopener noreferrer">對內連結</a>
    <p>b. 書籤：在左邊</p>
    <p>c. 框架頁：此頁面</p>
    <p>d. 表格+Youtube嵌入</p>

   <table>
